name: CD

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy via webhook
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    env:
      DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Skip when deploy secret is missing
        if: env.DEPLOY_WEBHOOK_URL == ''
        run: |
          echo "DEPLOY_WEBHOOK_URL secret is not configured."
          echo "Add it in GitHub repository settings to enable automatic deploys."

      - name: Trigger deployment webhook
        if: env.DEPLOY_WEBHOOK_URL != ''
        run: curl --fail --silent --show-error --location --request POST "$DEPLOY_WEBHOOK_URL"
