name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20
  CF_PAGES_PROJECT_NAME: pinequest-web

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run type-check
        run: npm run type-check

      - name: Run tests
        run: npm test --if-present

      - name: Build app
        run: npm run build

  deploy-web:
    name: Deploy Web
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Check Cloudflare credentials
        id: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "${CLOUDFLARE_API_TOKEN}" ] && [ -n "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Cloudflare secrets are missing, skipping web deploy."
          fi

      - name: Checkout code
        if: steps.cloudflare.outputs.available == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.cloudflare.outputs.available == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        if: steps.cloudflare.outputs.available == 'true'
        run: npm ci

      - name: Build for Cloudflare Pages
        if: steps.cloudflare.outputs.available == 'true'
        run: npm run build:pages

      - name: Resolve deploy target
        if: steps.cloudflare.outputs.available == 'true'
        run: |
          set -euo pipefail

          normalize() {
            local value="$1"
            value="$(printf '%s' "$value" | tr '[:upper:]' '[:lower:]')"
            value="$(printf '%s' "$value" | sed -E 's/[^a-z0-9-]+/-/g; s/-+/-/g; s/^-+//; s/-+$//')"
            value="${value:0:58}"
            value="$(printf '%s' "$value" | sed -E 's/^-+//; s/-+$//')"
            printf '%s' "$value"
          }

          is_valid() {
            [[ "$1" =~ ^[a-z0-9]([a-z0-9-]{0,56}[a-z0-9])?$ ]]
          }

          candidate="$(normalize "${CF_PAGES_PROJECT_NAME:-${GITHUB_REPOSITORY##*/}}")"
          if ! is_valid "$candidate"; then
            echo "::error::Failed to derive a valid Cloudflare Pages project name."
            exit 1
          fi

          echo "DEPLOY_PROJECT_NAME=$candidate" >> "$GITHUB_ENV"

      - name: Resolve Pages output directory
        if: steps.cloudflare.outputs.available == 'true'
        run: |
          set -euo pipefail

          for dir in apps/web/.vercel/output/static .vercel/output/static apps/web/out out; do
            if [ -d "$dir" ]; then
              echo "PAGES_OUTPUT_DIR=$dir" >> "$GITHUB_ENV"
              echo "Resolved Pages output directory: $dir"
              exit 0
            fi
          done

          echo "::error::Could not find a Cloudflare Pages output directory."
          echo "::error::Expected one of: apps/web/.vercel/output/static, .vercel/output/static, apps/web/out, out"
          exit 1

      - name: Ensure Cloudflare Pages project exists
        if: steps.cloudflare.outputs.available == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          project="${DEPLOY_PROJECT_NAME}"
          api_base="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects"
          compat_date="$(date -u +%F)"

          status="$(curl -sS -o /tmp/cf-project-check.json -w "%{http_code}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "${api_base}/${project}")"

          if [ "${status}" != "200" ] || ! grep -Eq '"success"[[:space:]]*:[[:space:]]*true' /tmp/cf-project-check.json; then
            create_response="$(curl -sS -X POST "${api_base}" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data "{\"name\":\"${project}\",\"production_branch\":\"main\",\"deployment_configs\":{\"preview\":{\"compatibility_date\":\"${compat_date}\",\"compatibility_flags\":[\"nodejs_compat\"]},\"production\":{\"compatibility_date\":\"${compat_date}\",\"compatibility_flags\":[\"nodejs_compat\"]}}}")"

            if ! echo "${create_response}" | grep -Eq '"success"[[:space:]]*:[[:space:]]*true'; then
              echo "::error::Failed to create Pages project '${project}'."
              echo "${create_response}"
              exit 1
            fi
          fi

      - name: Deploy to Cloudflare Pages
        if: steps.cloudflare.outputs.available == 'true'
        id: cloudflare-deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ${{ env.PAGES_OUTPUT_DIR }} --project-name=${{ env.DEPLOY_PROJECT_NAME }} --branch=main --commit-dirty=true

      - name: Print production URL
        if: steps.cloudflare.outputs.available == 'true'
        run: |
          echo "Production URL: ${{ steps.cloudflare-deploy.outputs.deployment-url }}"

  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Check Cloudflare credentials
        id: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "${CLOUDFLARE_API_TOKEN}" ] && [ -n "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Cloudflare secrets are missing, skipping API deploy."
          fi

      - name: Checkout code
        if: steps.cloudflare.outputs.available == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.cloudflare.outputs.available == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        if: steps.cloudflare.outputs.available == 'true'
        run: npm ci

      - name: Deploy API worker
        if: steps.cloudflare.outputs.available == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
          command: deploy
