query CreateExamOptions {
  me {
    id
  }
  mineRepositoryTree: questionRepositoryTree(repository: MINE) {
    subject
    grades {
      grade
      topics {
        topic
        bankCount
        questionCount
        subtopics {
          name
          questionCount
          bankIds
        }
      }
    }
  }
  unifiedRepositoryTree: questionRepositoryTree(repository: UNIFIED) {
    subject
    grades {
      grade
      topics {
        topic
        bankCount
        questionCount
        subtopics {
          name
          questionCount
          bankIds
        }
      }
    }
  }
  questionAccessRequests {
    id
    status
    requester {
      id
    }
    question {
      id
    }
  }
  classes {
    id
    name
    subject
    grade
  }
  questionBanks {
    id
    title
    repositoryKind
    subject
    grade
    topic
  }
  questions {
    id
    repositoryKind
    title
    prompt
    type
    difficulty
    shareScope
    requiresAccessRequest
    createdAt
    options
    correctAnswer
    tags
    createdBy {
      id
      fullName
    }
    bank {
      id
      title
      repositoryKind
      subject
      grade
      topic
      owner {
        id
      }
    }
  }
}
