query QuestionBankDetailQuery($id: ID!) {
  me {
    id
  }
  questionAccessRequests {
    id
    status
    createdAt
    reviewedAt
    requester {
      id
      fullName
    }
    owner {
      id
      fullName
    }
    question {
      id
      title
      prompt
      bank {
        id
        title
      }
    }
  }
  myQuestionBanks: questionBanks(repository: MINE) {
    id
    title
    grade
    subject
    topic
    repositoryKind
    owner {
      id
    }
  }
  questionBank(id: $id) {
    id
    title
    description
    repositoryKind
    grade
    subject
    topic
    topics
    visibility
    questionCount
    owner {
      id
      fullName
    }
    questions {
      id
      repositoryKind
      title
      prompt
      type
      difficulty
      shareScope
      requiresAccessRequest
      options
      correctAnswer
      tags
      createdBy {
        id
        fullName
      }
    }
  }
}
