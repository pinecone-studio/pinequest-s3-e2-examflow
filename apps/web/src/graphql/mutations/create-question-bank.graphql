mutation CreateQuestionBankMutation(
  $title: String!
  $description: String
  $grade: Int!
  $subject: String!
  $topic: String!
  $repositoryKind: QuestionRepositoryKind!
) {
  createQuestionBank(
    title: $title
    description: $description
    grade: $grade
    subject: $subject
    topic: $topic
    repositoryKind: $repositoryKind
  ) {
    id
    title
    repositoryKind
    grade
    subject
    topic
    visibility
  }
}
